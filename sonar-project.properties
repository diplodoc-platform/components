# SonarCloud project configuration
# This file will be generated/updated by SonarCloud when you connect your repository

# Project identification
# Note: sonar.organization can also be set via environment variable SONAR_ORGANIZATION
# or via GitHub Actions workflow. If not set here, it must be provided in the workflow.
sonar.organization=diplodoc-platform
sonar.projectKey=diplodoc-platform_components
sonar.projectName=components

# Source code location
sonar.sources=src
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/__tests__/**

# Test code location
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/__tests__/**

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Rule exclusions
sonar.issue.ignore.multicriteria=e1,e2
# S6767 false-positives: props are used, but the rule can't trace them through
# the memo(forwardRef(...)) wrapper the control components use.
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6767
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Feedback/controls/*.tsx
# S2925: Playwright visual tests legitimately need fixed settle waits before
# taking screenshots.
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2925
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.spec.ts
